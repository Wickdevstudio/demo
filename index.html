<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Status Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

.header{
    text-align:center;
    padding:20px;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    padding:10px;
}

.card{
    background:#1e293b;
    width:220px;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.value{
    font-size:32px;
    font-weight:bold;
    margin-top:10px;
}

.online{
    color:#22c55e;
}

.chart-container{
    width:90%;
    max-width:1000px;
    margin:20px auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

.footer{
    text-align:center;
    padding:15px;
    color:#94a3b8;
}
</style>
</head>
<body>

<div class="header">
    <h1>🚀 API Monitoring Dashboard</h1>
</div>

<div class="cards">
    <div class="card">
        <h3>Status</h3>
        <div class="value online">ONLINE</div>
    </div>

    <div class="card">
        <h3>CPU</h3>
        <div class="value" id="cpu">0%</div>
    </div>

    <div class="card">
        <h3>RAM</h3>
        <div class="value" id="ram">0%</div>
    </div>

    <div class="card">
        <h3>Requests</h3>
        <div class="value" id="req">0</div>
    </div>
</div>

<div class="chart-container">
    <canvas id="chart"></canvas>
</div>

<div class="footer">
    Last Update: <span id="time"></span>
</div>

<script>
const ctx = document.getElementById('chart');

const chart = new Chart(ctx,{
    type:'line',
    data:{
        labels:[],
        datasets:[{
            label:'API Requests',
            data:[],
            borderWidth:3,
            tension:0.4
        }]
    },
    options:{
        responsive:true,
        animation:false
    }
});

function updateData(){

    const cpu=Math.floor(Math.random()*40)+20;
    const ram=Math.floor(Math.random()*50)+30;
    const req=Math.floor(Math.random()*500)+100;

    document.getElementById('cpu').innerText=cpu+'%';
    document.getElementById('ram').innerText=ram+'%';
    document.getElementById('req').innerText=req;

    const now=new Date().toLocaleTimeString();

    document.getElementById('time').innerText=now;

    chart.data.labels.push(now);
    chart.data.datasets[0].data.push(req);

    if(chart.data.labels.length>20){
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();
}

updateData();
setInterval(updateData,1000);
</script>

</body>
</html>
